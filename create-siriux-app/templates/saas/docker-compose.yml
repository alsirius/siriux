version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: siriux-postgres
    environment:
      POSTGRES_DB: siriux_saas
      POSTGRES_USER: siriux
      POSTGRES_PASSWORD: siriux_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - siriux-network

  redis:
    image: redis:7-alpine
    container_name: siriux-redis
    ports:
      - "6379:6379"
    networks:
      - siriux-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siriux-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://siriux:siriux_password@postgres:5432/siriux_saas
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key
      JWT_REFRESH_SECRET: your-super-secret-refresh-key
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - siriux-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: siriux-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - siriux-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  siriux-network:
    driver: bridge
